name: Actualizar Datos Bolsa de Caracas
on:
  schedule:
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

jobs:
  actualizar:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v5          # ← v5 (Node.js 24, obligatorio desde jun 2)
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }} # ← token explícito para que persista en push

      - name: Instalar R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.0'

      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Cache paquetes R
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-pkgs-v2-${{ runner.os }}
          restore-keys: r-pkgs-v2-

      - name: Instalar paquetes R
        run: |
          install.packages(c(
            "readr", "dplyr", "stringr", "tidyr", "purrr",
            "lubridate", "httr", "writexl"
          ), repos = "https://cloud.r-project.org", Ncpus = 2)
        shell: Rscript {0}

      - name: Ejecutar actualizar_bolsa.R
        run: Rscript actualizar_bolsa.R

      - name: Commit y push de datos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # ← token disponible en el paso
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "datos: actualización $(date -u +'%Y-%m-%d')"
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git HEAD:${{ github.ref_name }}
